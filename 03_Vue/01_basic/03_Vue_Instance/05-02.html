<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Vue 3 계좌 관리</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      금액: <input type="text" v-model.number="amount" /> <br />
      <button @click="deposit">입금</button>
      <button @click="withdraw">인출</button>
      <br />
      <h3>계좌 잔고: [{{ balance }}]</h3>
    </div>

    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            amount: 0,
            balance: 0,
          };
        },
        methods: {
          deposit() {
            // 입력된 금액을 현재 잔고에 더함
            this.balance += this.amount;
          },
          withdraw() {
            // 현재 잔고에서 입력된 금액을 뺌
            if (this.balance >= this.amount) {
              this.balance -= this.amount;
            } else {
              alert('잔액이 부족합니다.');
            }
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
