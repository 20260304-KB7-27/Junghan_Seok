<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue Sum App</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      1보다 큰 수 : <input type="text" v-model.number="num" /><br />
      1부터 입력한 값까지의 합 : <span>{{ sum }}</span>
    </div>

    <script>
      const { createApp, ref, computed, onMounted, onUpdated } = Vue;

      createApp({
        setup() {
          const num = ref(0);

          // 계산된 속성 (Computed)
          const sum = computed(() => {
            let n = num.value;
            if (isNaN(n) || n < 1) return 0;
            return (n * (n + 1)) / 2;
          });

          // 생명주기 훅
          onMounted(() => {
            console.log(`## mounted: 컴포넌트가 화면에 부착되었습니다.`);
          });

          onUpdated(() => {
            console.log(
              `## updated: 데이터가 변경되어 DOM이 재렌더링되었습니다.`,
            );
          });

          // template에서 사용할 변수와 계산된 속성 반환
          return {
            num,
            sum,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
