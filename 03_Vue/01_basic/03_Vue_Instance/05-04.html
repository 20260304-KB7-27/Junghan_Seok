<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Vue 한글 실시간 입력</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input
        type="text"
        :value="name"
        @input="name = $event.target.value"
      /><br />
      이름: <span>{{ name }}</span>
    </div>

    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            name: '',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
