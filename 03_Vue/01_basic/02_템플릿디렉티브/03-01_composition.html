<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 Composition API 연습</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div>
        <h2>일반 메세지: {{ nomalMessage }}</h2>
        <h2>반응형 메세지: {{ message }}</h2>
        <h2>현재 시간: {{ currentTime }}</h2>
      </div>
    </div>

    <script>
      const { createApp, ref, onMounted } = Vue;

      createApp({
        setup() {
          const nomalMessage = '일반 메세지';
          const message = ref('안녕하세요 Vue!');
          const currentTime = ref(new Date().toLocaleTimeString());

          onMounted(() => {
            setInterval(() => {
              currentTime.value = new Date().toLocaleTimeString();
            }, 1000);
          });

          return {
            nomalMessage,
            message,
            currentTime,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
