<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <!-- 
    v-for
    문법: v-for="(item, key,index) in 배열" 
    주의
    : key 속성을 필수적으로 등록!!
    인덱스값은 변동성이 있기 때문에 key로 권장하지 않음.
    -->
    <div id="app">
      <ul>
        <li v-for="(value, key,index) in fruits" :key="index">
          {{index}} => {{key}}:{{value}}
        </li>
      </ul>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const user = ref({
            name: '영희',
            age: 25,
            city: '서울',
          });
          return { user };
        },
      }).mount('#app');
    </script>
  </body>
</html>
