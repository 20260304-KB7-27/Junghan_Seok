<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      .buttonColor {
        background-color: aqua;
        color: black;
      }
      .buttonLayout {
        text-align: center;
        width: 120px;
        height: 50px;
      }
      .staticBorder {
        border: khaki dashed 2px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <label
        ><input type="checkbox" v-model="isLayoutActive" /> 레이아웃 적용</label
      ><br />

      <hr />

      <button
        class="staticBorder"
        :class="{ buttonColor, buttonLayout: isLayoutActive }"
      >
        테스트 버튼
      </button>
    </div>

    <script type="text/javascript">
      var vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            isLayoutActive: false,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
