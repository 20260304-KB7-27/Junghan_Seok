<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Options API</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div
        @contextmenu.prevent="ctxStop"
        style="
          position: absolute;
          left: 5px;
          top: 5px;
          right: 5px;
          bottom: 5px;
          background-color: #f0f0f0;
        "
      >
        <a href="https://facebook.com" @click="confirmFB">페이스북</a>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        name: 'App',
        data() {
          return {};
        },
        methods: {
          ctxStop(e) {
            console.log('우클릭 방지됨');
          },
          confirmFB(e) {
            if (!confirm('페이스북으로 이동할까요?')) {
              e.preventDefault();
            }
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
