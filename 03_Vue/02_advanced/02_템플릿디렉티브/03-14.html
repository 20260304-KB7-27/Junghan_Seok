<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>03-14 실습</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      table {
        border-collapse: collapse;
        width: 500px;
        text-align: center;
      }
      th {
        background-color: purple;
        color: white;
        padding: 8px;
      }
      td {
        border: 1px solid #ccc;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>이름</th>
            <th>전화번호</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(c, index) in contacts" :key="index">
            <td>{{ index + 1 }}</td>
            <td>{{ c.name }}</td>
            <td>{{ c.tel }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        name: 'App',
        data() {
          return {
            contacts: [
              { name: 'RM', tel: '010-3456-8299' },
              { name: '정국', tel: '010-3456-8298' },
              { name: '제이홉', tel: '010-3456-8297' },
              { name: '슈가', tel: '010-3456-8296' },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
