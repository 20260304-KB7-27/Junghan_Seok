<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 함수를 선언합니다.
      function callTenTimes(num, callback) {
        // 10회 반복합니다.
        for (let i = 0; i < num; i++) {
          callback(); // 매개변수로 전달된 함수를 호출합니다.
        }
      }
      // 변수를 선언합니다.
      let fun = function () {
        alert('함수 호출');
      };
      // 함수를 호출합니다.
      callTenTimes(5, fun);
    </script>
  </head>

  <body></body>
</html>
