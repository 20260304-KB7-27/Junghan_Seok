<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 변수를선언합니다.
      let output = 0;
      // 반복을수행합니다.
      for (let i = 0; i <= 100; i++) {
        output += i;
      }
      // 출력합니다.
      alert(output);
    </script>
  </head>

  <body></body>
</html>
