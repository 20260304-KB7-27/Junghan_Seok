<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>display_inline</title>
    <style>
      #box {
        width: 250px;
        height: 30px;
        background-color: skyblue;
        display: inline;
      }
    </style>
  </head>
  <body>
    <span style="border: 1px solid black; padding: 5px">
      <span>더미 객체</span>
      <div id="box">대상 객체</div>
      <span>더미 객체</span>
    </span>
  </body>
</html>
