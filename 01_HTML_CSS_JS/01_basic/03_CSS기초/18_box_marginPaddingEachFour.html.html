<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>box_marginPaddingEachFour</title>
    <style>
      .box {
        width: 100px;
        height: 100px;
        background-color: red; /* 가운데 빨간 박스 */

        /* 마진 설정 */
        margin-top: 0;
        margin-bottom: 0;
        margin-right: 50px;
        margin-left: 50px;
        border: 1px solid black;

        /* 상우하좌 순서로 패딩 설정 */
        padding-top: 0;
        padding-bottom: 0;
        padding-right: 20px;
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <span class="box"></span>
  </body>
</html>
