<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // 변수를선언합니다.
      let i = 0;
      let array = [10, 20, 30, 40, 50];
      // 반복을수행합니다. i가배열원소개수인3보다작을때반복합니다.
      while (i < array.length) {
        // 출력합니다.
        alert(i + '번째출력: ' + array[i]);
        // 탈출하려고변수를더합니다.
        i++;
      }
    </script>
  </head>

  <body></body>
</html>
