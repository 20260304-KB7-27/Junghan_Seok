<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      window.onload = function () {
        let button = document.getElementById('btn'); // ID는 문자열(' ')로 감싸야 합니다.

        button.onclick = function () {
          // name이 'food'인 모든 체크박스 요소를 가져옵니다.
          let foods = document.getElementsByName('food');
          let selectedFoods = [];

          // 반복문을 돌며 체크(checked)된 항목의 값만 배열에 담습니다.
          for (let i = 0; i < foods.length; i++) {
            if (foods[i].checked) {
              selectedFoods.push(foods[i].value);
            }
          }

          // 결과 출력 (배열을 문자열로 합쳐서 출력)
          console.log('좋아하는 음식은 ' + selectedFoods.join(', '));
        };
      };
    </script>
  </head>

  <body>
    <form>
      <div>
        좋아하는음식은?
        <label><input type="checkbox" name="food" value="라면" />라면</label>
        <label><input type="checkbox" name="food" value="만두" />만두</label>
        <label
          ><input type="checkbox" name="food" value="불고기" />불고기</label
        >
        <input id="btn" type="button" value="전송" />
      </div>
    </form>
  </body>
</html>
