<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <title>패턴1</title>
    <meta
      name="viewport"
      content="user-scalable=no,initial-scale=1,maximumscale=1"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        width: 960px;
        display: flex;
      }
      #menu {
        width: 260px;
        /* float: left; */
      }

      #section {
        width: 700px;
        /* float: right; left로 입력해도 상관없음 */
      }
      li {
        list-style: none;
      }
      @media screen and (max-width: 767px) {
        /* 스마트폰 사이즈에서는 전부 해제합니다. */
        body {
          width: auto;
          flex-direction: column;
        }
        #menu {
          width: auto;
        }
        #section {
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <ul>
        <li>메뉴A</li>
        <li>메뉴B</li>
        <li>메뉴C</li>
      </ul>
    </div>
    <div id="section">
      <h1>Lorem ipsum</h1>
      <p>
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Soluta,
        deserunt, adipisci aperiam autem tempora voluptatibus modi nam neque, id
        pariatur quos? Ratione, ea. Autem, veniam ea reprehenderit dolore
        doloremque vel.
      </p>
    </div>
  </body>
</html>
